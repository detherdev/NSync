<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>Play inSync</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/>
        </svg>
        <h1 class="logo-text">Play inSync</h1>
      </div>
      <div class="header-right">
        <button class="btn-theme" id="btnTheme" title="Toggle theme">
          <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="display:none">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
        <div class="status-badge" id="statusBadge">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-label" id="statusLabel">Disconnected</span>
        </div>
      </div>
    </header>

    <!-- Tab selection (always visible) -->
    <div class="input-group tab-select-group">
      <select id="selectTab" class="select-tab" title="Select tab to mirror">
        <option value="">Loading tabs...</option>
      </select>
    </div>

    <!-- Disconnected view -->
    <section id="viewDisconnected" class="view">
      <button class="btn btn-primary" id="btnCreate">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Create Room
      </button>

      <div class="divider"><span>or</span></div>

      <div class="input-group">
        <input
          type="text"
          id="inputCode"
          class="input"
          placeholder="Enter room code"
          maxlength="4"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn btn-secondary" id="btnJoin">Join</button>
      </div>

      <p class="error-text" id="errorText"></p>
    </section>

    <!-- Connected view -->
    <section id="viewConnected" class="view hidden">
      <div class="room-card">
        <span class="room-label">Room Code</span>
        <span class="room-code" id="roomCode">----</span>
        <button class="btn-copy" id="btnCopy" title="Copy code">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>

      <div class="peers-info">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87"/>
          <path d="M16 3.13a4 4 0 010 7.75"/>
        </svg>
        <span id="peerCount">1</span> connected
      </div>

      <button class="btn btn-danger" id="btnLeave">
        Leave Room
      </button>
    </section>
    <!-- Footer -->
    <footer class="footer">
      <span>App by Davey Figueroa</span>
      <span class="footer-sep">·</span>
      <a href="https://www.paypal.com/paypalme/daveyfi" target="_blank" rel="noopener" class="tip-link">☕ Tip Davey</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
